<!doctype html>
<html lang="en">

<head>

  <!-- Basic Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title -->
  <title>Vaani Verse — AI Voice Assistant</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- SEO Meta -->
  <meta name="description" content="Vaani Verse — Royal AI Voice Assistant powered by modular AI agents. Voice-first intelligent interaction." />

  <!-- Google Fonts (Premium AI Look) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?
  family=Orbitron:wght@400;600;700;800&
  family=Inter:wght@300;400;500;600;700&
  display=swap" rel="stylesheet">


  <!-- Background + Smooth Rendering -->
  <style>

    html,
    body,
    #root {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {

      font-family: 'Inter', sans-serif;

      background: linear-gradient(
        135deg,
        #0f0c29,
        #302b63,
        #24243e
      );

      background-size: 400% 400%;

      animation: gradientMove 15s ease infinite;

      color: white;

      overflow-x: hidden;

      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;

    }


    @keyframes gradientMove {

      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }

    }

  </style>


</head>


<body>

  <!-- React Root -->
  <div id="root"></div>

  <!-- React Entry -->
  <script type="module" src="/src/main.jsx"></script>

</body>


</html>
